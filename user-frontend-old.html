<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Maria - Salsa Macha</title>
  <meta name="description" content="Handcrafted Salsa Macha. Artisanal, Spicy, Crunchy.">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=open-sans:400,600,700|oswald:400,700,900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
:root {
  --color-surface: #eceef4;
  --color-surface-dark: #e4e6ed;
  --color-ink: #2d2d3a;
  --color-muted: #7a7d8c;
  --color-white: #ffffff;
  
  --shadow-light-color: #ffffff;
  --shadow-mid-color: #d6d9e4;
  --shadow-dark-color: #d0d3de;
}

html.dark {
  --color-surface: #16161b;
  --color-surface-dark: #121216;
  --color-ink: #f0f2f8;
  --color-muted: #888c99;
  --color-white: #1a1a20;

  --shadow-light-color: #202026;
  --shadow-mid-color: #0d0d10;
  --shadow-dark-color: #0a0a0c;
}

@theme {
  --color-surface: var(--color-surface);
  --color-surface-dark: var(--color-surface-dark);
  --color-coral: #e8553e;
  --color-coral-dark: #c43e2a;
  --color-ink: var(--color-ink);
  --color-muted: var(--color-muted);
  --color-white: var(--color-white);
  --font-display: 'Oswald', Arial, sans-serif;
  --font-sans: 'Open Sans', Arial, sans-serif;
  --radius-neo: 1.25rem;
  --radius-neo-sm: 0.75rem;
}

@layer base {
  *, *::before, *::after { box-sizing: border-box; }
  body { background-color: var(--color-surface); color: var(--color-ink); font-family: 'Open Sans', Arial, sans-serif; overflow-x: hidden; line-height: 1.5; transition: background-color 0.4s, color 0.4s; }
  [x-cloak] { display: none !important; }
  img { max-width: 100%; height: auto; display: block; }
  a { color: inherit; text-decoration: none; }
}

@layer utilities {
  .neo { box-shadow: 12px 12px 30px var(--shadow-mid-color), -12px -12px 30px var(--shadow-light-color); }
  .neo-sm { box-shadow: 6px 6px 14px var(--shadow-mid-color), -6px -6px 14px var(--shadow-light-color); }
  .neo-lg { box-shadow: 18px 18px 40px var(--shadow-dark-color), -18px -18px 40px var(--shadow-light-color); }
  .neo-inset { box-shadow: inset 5px 5px 12px var(--shadow-mid-color), inset -5px -5px 12px var(--shadow-light-color); }
  .neo-btn { box-shadow: 5px 5px 12px var(--shadow-dark-color), -3px -3px 8px var(--shadow-light-color); }
  .neo-btn:active { box-shadow: inset 3px 3px 7px var(--shadow-dark-color), inset -2px -2px 5px var(--shadow-light-color); transform: scale(0.98); }
  .font-display { font-family: 'Oswald', Arial, sans-serif; }
  .section-pad { padding: 8rem 1rem; }
  @media (min-width: 768px) { .section-pad { padding: 12rem 2rem; } }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .animate-marquee { animation: marquee 32s linear infinite; }
  .animate-marquee-rev { animation: marquee 32s linear infinite reverse; }
  @keyframes floatY1 { 0%,100% { translate: 0 0px; } 50% { translate: 0 -40px; } }
  @keyframes floatY2 { 0%,100% { translate: 0 0px; } 50% { translate: 0 -60px; } }
  @keyframes floatY3 { 0%,100% { translate: 0 0px; } 50% { translate: 0 -25px; } }
  .animate-float-1 { animation: floatY1 14s ease-in-out infinite; }
  .animate-float-2 { animation: floatY2 18s ease-in-out infinite; }
  .animate-float-3 { animation: floatY3 12s ease-in-out infinite; }
  @keyframes jumpDown {
    0% { transform: translateY(-150vh) scale(0.5) rotate(15deg); opacity: 0; }
    65% { transform: translateY(4%) scale(1.05) rotate(-2deg); opacity: 1; }
    100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  }
  .animate-jump-down {
    animation: jumpDown 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes kickflip {
    0% { transform: perspective(1200px) rotateX(-110deg) translateY(100px); opacity: 0; }
    65% { transform: perspective(1200px) rotateX(15deg) translateY(-15px); opacity: 1; }
    100% { transform: perspective(1200px) rotateX(0deg) translateY(0); opacity: 1; }
  }
  .animate-kickflip {
    animation: kickflip 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    transform-origin: center center;
  }
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.revealed { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body class="bg-surface">

  <div id="app" x-data="app" x-cloak>

    <!-- Loading State -->
    <div x-show="!appConfig"
      style="position:fixed;inset:0;background:var(--color-surface);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;">

            xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="Layer_1"

              <path style="fill:#E54728;"

              <path style="fill:#FFFFFF;"

            </g>
          </svg>
          <p class="font-display uppercase text-2xl font-bold text-ink"
            x-text="lang === 'hr' ? 'Učitavanje...' : 'Loading...'">Loading…</p>
        </div>
      </template>
      <template x-if="appError">
        <div class="neo rounded-2xl p-8 text-center max-w-md">
          <p class="font-display text-coral text-3xl font-black uppercase mb-3"
            x-text="lang === 'hr' ? 'Greška u podacima' : 'Data Error'">Data Error</p>
          <p class="text-muted font-semibold text-sm" x-text="appError"></p>
        </div>
      </template>
    </div>

    <template x-if="appConfig">
      <div>

        <!-- NAV -->
        <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-300" :class="isScrolled ? 'py-2' : 'py-3'"
          style="background:color-mix(in srgb, var(--color-surface) 85%, transparent);backdrop-filter:blur(16px);box-shadow:0 4px 16px var(--shadow-mid-color),0 -1px 0 var(--shadow-light-color);">
          <div class="max-w-5xl mx-auto px-4 flex items-center justify-between relative">

            <!-- Logo -->
            <div @click="goToView('home')"
              class="font-display text-2xl font-black uppercase cursor-pointer text-ink tracking-tight select-none">
              La<span class="text-coral">Maria</span>.
            </div>

            <!-- Desktop links (center) -->
            <div class="hidden md:flex items-center gap-6">
              <template x-for="id in ['flavors','story']" :key="id">
                <button @click="scrollToSection(id)"
                  class="font-display text-sm font-bold uppercase tracking-wide text-ink hover:text-coral transition-colors cursor-pointer bg-transparent border-none"
                  x-text="tr.nav?.[id]"></button>
              </template>
              <button @click="goToBlog()"
                class="font-display text-sm font-bold uppercase tracking-wide text-coral hover:text-coral-dark transition-colors cursor-pointer bg-transparent border-none"
                x-text="tr.nav?.blog"></button>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-2">
              <button @click="darkMode = !darkMode"
                class="neo-sm rounded-xl p-2.5 bg-surface hover:text-coral transition-colors"
                title="Toggle Dark Mode">
                <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                <svg x-show="darkMode" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
              </button>
              <button @click="toggleLang"
                class="neo-sm rounded-xl px-3 py-2 font-display text-sm font-bold uppercase text-ink hover:text-coral transition-colors bg-surface"
                x-text="lang==='en'?'HR':'EN'"></button>
              <button @click="isCartOpen=true;isMobileMenuOpen=false"
                class="neo-sm rounded-xl p-2.5 relative bg-surface hover:text-coral transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                  <path d="M3 6h18" />
                  <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                <span x-show="cartCount>0"
                  class="absolute -top-1 -right-1 w-5 h-5 bg-coral text-white text-xs font-bold rounded-full flex items-center justify-center"
                  x-text="cartCount"></span>
              </button>
              <button @click="isMobileMenuOpen=!isMobileMenuOpen" class="md:hidden neo-sm rounded-xl p-2.5 bg-surface">
                <svg x-show="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round">
                  <line x1="4" x2="20" y1="6" y2="6" />
                  <line x1="4" x2="20" y1="12" y2="12" />
                  <line x1="4" x2="20" y1="18" y2="18" />
                </svg>
                <svg x-show="isMobileMenuOpen" style="display:none" xmlns="http://www.w3.org/2000/svg" width="22"
                  height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </div>

            <!-- Mobile Menu -->
            <div class="absolute top-full left-0 w-full md:hidden transition-all duration-300 overflow-hidden"
              :style="isMobileMenuOpen ? 'max-height:300px;opacity:1' : 'max-height:0;opacity:0'"
              style="background:color-mix(in srgb, var(--color-surface) 97%, transparent);backdrop-filter:blur(16px);box-shadow:0 8px 20px var(--shadow-mid-color);">
              <div class="flex flex-col items-center gap-5 py-6">
                <template x-for="id in ['flavors','story']" :key="id">
                  <button @click="scrollToSection(id);isMobileMenuOpen=false"
                    class="font-display text-lg font-bold uppercase text-ink hover:text-coral transition-colors bg-transparent border-none cursor-pointer"
                    x-text="tr.nav?.[id]"></button>
                </template>
                <button @click="goToBlog();isMobileMenuOpen=false"
                  class="font-display text-lg font-bold uppercase text-coral bg-transparent border-none cursor-pointer"
                  x-text="tr.nav?.blog"></button>
              </div>
            </div>
          </div>
        </nav>

        <!-- CART DRAWER -->
        <div x-show="isCartOpen" style="position:relative;z-index:60;">
          <div x-show="isCartOpen" x-transition:enter="transition duration-200" x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100" class="fixed inset-0"
            style="background:rgba(44,44,58,0.45);backdrop-filter:blur(4px);" @click="isCartOpen=false"></div>
          <div class="fixed top-0 right-0 h-full w-full max-w-sm flex flex-col transition-transform duration-300"
            :class="isCartOpen?'translate-x-0':'translate-x-full'"
            style="background:var(--color-surface);box-shadow:-8px 0 32px var(--shadow-mid-color);">
            <div class="flex justify-between items-center p-5 border-b border-white/60" style="background:var(--color-surface-dark);">
              <h2 class="font-display text-2xl font-black uppercase text-ink" x-text="tr.cart?.title"></h2>
              <button @click="isCartOpen=false"
                class="neo-sm rounded-xl p-2 bg-surface hover:text-coral transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6 6 18" />
                  <path d="m6 6 12 12" />
                </svg>
              </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
              <div x-show="cart.length===0" class="text-center py-12 text-muted font-bold uppercase text-sm"
                x-text="tr.cart?.empty"></div>
              <template x-for="item in cart" :key="item.id">
                <div class="neo-sm rounded-2xl p-3 flex gap-3 bg-surface">
                  <img :src="item.image" class="w-16 h-16 rounded-xl object-contain">
                  <div class="flex-1 flex flex-col justify-between">
                    <div class="flex justify-between font-bold text-sm text-ink">
                      <span x-text="tr.products?.[item.translationKey]?.name"></span>
                      <span class="text-coral" x-text="'€'+(item.price*item.qty).toFixed(2)"></span>
                    </div>
                    <div class="flex items-center gap-1 mt-2">
                      <button @click="updateCartQty(item.id,-1)"
                        class="neo-sm rounded-lg w-7 h-7 flex items-center justify-center text-sm font-bold bg-surface hover:text-coral">−</button>
                      <span
                        class="neo-inset rounded-lg w-8 h-7 flex items-center justify-center text-xs font-bold bg-surface"
                        x-text="item.qty"></span>
                      <button @click="updateCartQty(item.id,1)"
                        class="neo-sm rounded-lg w-7 h-7 flex items-center justify-center text-sm font-bold bg-surface hover:text-coral">+</button>
                    </div>
                  </div>
                </div>
              </template>
            </div>
            <div class="p-5 border-t border-white/60" style="background:var(--color-surface-dark);">
              <div class="flex justify-between font-display text-2xl font-black text-ink mb-4">
                <span x-text="tr.cart?.total"></span>
                <span class="text-coral" x-text="'€'+cartTotal"></span>
              </div>
              <button @click="handleCheckout"
                class="w-full neo-btn rounded-2xl py-4 font-display font-black uppercase text-white text-base tracking-wide transition-all bg-coral hover:bg-[#c43e2a]"
                x-text="tr.cart?.checkout"></button>
            </div>
          </div>
        </div>

        <!-- MAIN -->
        <main style="padding-top:4.5rem;">

          <!-- ===== HOME VIEW ===== -->
          <div x-show="view==='home'">

            <!-- HERO -->
            <section id="home"
              class="min-h-[75vh] md:h-[1080px] flex items-center justify-center pt-[100px] pb-24 md:pt-[140px] md:pb-32 relative overflow-hidden"
              style="perspective: 1000px;">
              <!-- Floating Depth Images -->
              <div class="absolute inset-0 pointer-events-none overflow-hidden" style="z-index: 0;">
                <!-- Top left -->
                <div class="absolute top-[0%] left-[-15%] md:left-[5%] w-28 md:w-80 animate-jump-down"
                  style="animation-delay: 0.1s;">
                  <img src="https://form.lamariasalsa.com/assets/images/image01.png" alt=""
                    class="w-full rotate-[-12deg] opacity-90 drop-shadow-[0_40px_40px_rgba(0,0,0,0.15)] animate-float-1"
                    style="animation-delay: 0s; filter: blur(3px);">
                </div>
                <!-- Top right small -->
                <div class="absolute top-[5%] right-[5%] w-16 md:w-28 animate-jump-down"
                  style="animation-delay: 0.25s;">

  <!-- Alpine app logic -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => ({
        appConfig: null, appError: null, lang: 'en', isScrolled: false, isMobileMenuOpen: false, isCartOpen: false,
        cart: [], view: 'home', checkoutBundle: null, posts: [], currentPost: null, isLoadingPosts: true, activeCategory: null,
        originalTitle: document.title, darkMode: false,
        async init() {
          this.darkMode = localStorage.getItem('darkMode') === 'true' || 
                         (window.matchMedia('(prefers-color-scheme: dark)').matches && localStorage.getItem('darkMode') === null);
          this.$watch('darkMode', v => {
              localStorage.setItem('darkMode', v);
              if(v) document.documentElement.classList.add('dark');
              else document.documentElement.classList.remove('dark');
          });
          if(this.darkMode) document.documentElement.classList.add('dark');

          let t = false;
          window.addEventListener('scroll', () => { if (!t) { window.requestAnimationFrame(() => { this.isScrolled = window.scrollY > 30; t = false; }); t = true; } }, { passive: true });
          this.$watch('view', v => { this.isMobileMenuOpen = false; if (v === 'home') setTimeout(() => this.initScrollReveal(), 100); this.updateSEO(); });
          this.$watch('lang', () => this.updateSEO());
          this.$watch('currentPost', () => this.updateSEO());
          try {
            const r = await fetch('https://raw.githubusercontent.com/kr10o/lamaria/refs/heads/main/data.json');
            if (r.ok) {
              const txt = await r.text(); try {
                const d = JSON.parse(txt);
                const imgMap = { original: 'https://form.lamariasalsa.com/assets/images/image01.png', chipotle: 'https://form.lamariasalsa.com/assets/images/image02.png', habanero: 'https://form.lamariasalsa.com/assets/images/image03.png' };
                const postImgMap = { 'history-of-salsa-macha': 'https://form.lamariasalsa.com/assets/images/image04.png', '5-ways-to-eat-salsa-macha': 'https://form.lamariasalsa.com/assets/images/image06.png' };
                const galleryImages = [
                  { src: "https://form.lamariasalsa.com/assets/images/image06.png", aspect: "aspect-[3/4]" },
                  { src: "https://form.lamariasalsa.com/assets/images/image04.png", aspect: "aspect-square" },
                  { src: "https://form.lamariasalsa.com/assets/images/image03.png", aspect: "aspect-video" },
                  { src: "https://form.lamariasalsa.com/assets/images/image01.png", aspect: "aspect-square" },
                  { src: "https://form.lamariasalsa.com/assets/images/image06.png", aspect: "aspect-[4/3]" },
                  { src: "https://form.lamariasalsa.com/assets/images/image02.png", aspect: "aspect-[3/4]" },
                  { src: "https://form.lamariasalsa.com/assets/images/image03.png", aspect: "aspect-square" }
                ];
                if (d.products) d.products = d.products.map(p => ({ ...p, image: imgMap[p.translationKey] || p.image }));
                if (d.posts) d.posts = d.posts.map(p => ({ ...p, image: postImgMap[p.slug] || 'https://form.lamariasalsa.com/assets/images/image02.png' }));
                d.galleryImages = galleryImages;

                if (d.translations) {
                  const inject = (lang, data) => d.translations[lang] = { ...d.translations[lang], ...data };
                  inject('en', {
                    process_steps: [
                      { title: "Sourcing", desc: "Selecting the finest local sunflower and olive oils, paired with authentic Mexican chiles.", img: "https://form.lamariasalsa.com/assets/images/image02.png" },
                      { title: "Toasting", desc: "Slow-roasting garlic, seeds, and nuts until perfectly golden and aromatic.", img: "https://form.lamariasalsa.com/assets/images/image04.png" },

        get products() { return this.appConfig ? this.appConfig.products : []; },
        get cartCount() { return this.cart.reduce((a, i) => a + i.qty, 0); },
        get cartTotal() { return this.cart.reduce((s, i) => s + (i.price * i.qty), 0).toFixed(2); },
        get allCategories() { const c = new Set(); this.posts.forEach(p => { if (p.categories) p.categories.forEach(x => c.add(x)); }); return Array.from(c); },
        get filteredPosts() { if (!this.activeCategory) return this.posts; return this.posts.filter(p => p.categories && p.categories.includes(this.activeCategory)); },
        get tr() { return this.appConfig ? this.appConfig.translations[this.lang] : {}; },
        toggleLang() { this.lang = this.lang === 'en' ? 'hr' : 'en'; this.isMobileMenuOpen = false; },
        goToView(v) { this.view = v; document.title = this.originalTitle; this.updateURL(''); window.scrollTo(0, 0); },
        scrollToSection(id) {
          this.isMobileMenuOpen = false;
          if (this.view !== 'home') { this.view = 'home'; this.updateURL(''); }
          setTimeout(() => { const el = document.getElementById(id); if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' }); }, 50);
        },
        handleRouting() {
          const p = new URLSearchParams(window.location.search);
          const slug = p.get('post'), cat = p.get('category');
          if (slug) this.loadPostBySlug(slug, false);
          else if (cat) this.goToBlog(cat, false);
          else { if (this.view !== 'home' && this.view !== 'checkout') { this.view = 'home'; document.title = this.originalTitle; } }
        },
        goToBlog(category = null, pushState = true) {
          this.view = 'blog'; this.activeCategory = category;
          let title = 'Blog', url = '?blog';
          if (category) { title = category.toUpperCase() + ' - Blog'; url = '?category=' + category; }
          document.title = title + ' | ' + this.originalTitle;
          if (pushState) this.updateURL(url); window.scrollTo(0, 0);
        },
        filterCategory(c) { this.goToBlog(c, true); },
        goToPost(slug) { this.loadPostBySlug(slug, true); },
        loadPostBySlug(slug, push) {
          const f = this.posts.find(p => p.slug === slug);
          if (f) { this.currentPost = f; this.view = 'post'; let t = f?.translations?.[this.lang]?.title || f?.title || 'Blog'; document.title = t + ' | ' + this.originalTitle; if (push) this.updateURL('?post=' + slug); }
          else { this.currentPost = null; this.view = 'post'; }
          window.scrollTo(0, 0);
        },
        updateURL(q) {
          try { let b = window.location.origin + window.location.pathname; if (b.startsWith('blob:')) return; window.history.pushState({ path: b + q }, '', b + q); }
          catch (e) { console.warn('Routing URL update skipped.'); }
        },
        addToCart(product) {
          const e = this.cart.find(p => p.id === product.id);
          if (e) e.qty++; else this.cart.push({ ...product, qty: 1 });
          this.isCartOpen = true;
        },
        updateCartQty(id, delta) {
          const item = this.cart.find(p => p.id === id);
          if (item) { item.qty += delta; if (item.qty <= 0) this.cart = this.cart.filter(p => p.id !== id); }
        },
        handleCheckout() { this.checkoutBundle = { items: [...this.cart], total: this.cartTotal }; this.isCartOpen = false; this.view = 'checkout'; window.scrollTo(0, 0); },
        proceedToCarrd(e) {
          if (e) e.preventDefault();
          const s = this.checkoutBundle.items.map(i => { const sub = (i.price * i.qty).toFixed(2); const n = this.tr.products?.[i.translationKey]?.name || 'Product'; return `${i.qty}x ${n} (€${sub})`; }).join(', ');
          const d = `ORDER: ${s} | TOTAL: €${this.checkoutBundle.total}`;
          const params = new URLSearchParams(window.location.search); params.set('pass', d);
          window.location.href = window.location.pathname + `?${params.toString()}#kontakt`;
        },
        updateSEO() {
          setTimeout(() => {
            let desc = "Handcrafted Salsa Macha. Artisanal, Spicy, Crunchy.";
            let img = "https://form.lamariasalsa.com/assets/images/image01.png";
            let title = document.title;
            if (this.view === 'post' && this.currentPost) {
              desc = this.currentPost?.translations?.[this.lang]?.excerpt || this.currentPost?.excerpt || desc;
              desc = desc.replace(/<[^>]*>?/gm, '');
              img = this.currentPost?.image || img;
            }
            let setMeta = (n, c) => {
              let el = document.querySelector(`meta[property="${n}"]`) || document.querySelector(`meta[name="${n}"]`);
              if (!el) { el = document.createElement('meta'); if (n.startsWith('og:')) el.setAttribute('property', n); else el.setAttribute('name', n); document.head.appendChild(el); }
              el.setAttribute('content', c);
            };
            setMeta('description', desc);
            setMeta('og:title', title);
            setMeta('og:description', desc);
            setMeta('og:image', img);
            setMeta('og:url', window.location.href);
          }, 50);
        },
        initScrollReveal() {
          const obs = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); obs.unobserve(e.target); } }); }, { threshold: 0.08 });
          setTimeout(() => { document.querySelectorAll('.reveal').forEach(el => obs.observe(el)); }, 100);
        }
      }));
    });
